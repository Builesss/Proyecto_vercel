<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Productos</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 40px;
            background-color: #f4f4f4;
        }

        form {
            background: white;
            padding: 20px;
            border-radius: 8px;
            max-width: 300px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        div {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            background-color: #218838;
        }
    </style>
</head>

<body>

    <h2>Agregar Nuevo Producto</h2>

    <form action="/guardar-datos" method="POST">
        <div>
            <label for="id">ID del Producto:</label>
            <input type="number" id="id" name="id" required placeholder="Ej: 101">
        </div>

        <div>
            <label for="name">Nombre:</label>
            <input type="text" id="name" name="name" required placeholder="Nombre del producto">
        </div>

        <div>
            <label for="price">Precio:</label>
            <input type="number" id="price" name="price" step="0.01" required placeholder="0.00">
        </div>

        <button type="submit">Guardar Producto</button>
    </form>

</body>

</html>
